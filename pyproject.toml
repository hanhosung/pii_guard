[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.backends.legacy:build"

[project]
name = "pii-guard"
version = "0.1.0"
description = "Local-first PII and secret detection/redaction engine for LLM gateway proxy"
requires-python = ">=3.9"
dependencies = [
    "pyyaml>=6.0",
]

[project.scripts]
piiguard = "pii_guard.cli:main"

[project.optional-dependencies]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"
markers = [
    "integration: live pf(4) + network integration tests — require root and real network (run with: sudo pytest -m integration)",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["pii_guard*"]
